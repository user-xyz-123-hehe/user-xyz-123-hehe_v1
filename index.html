<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#f4f7f6"> 
  
  <title>Attendance Portal</title>
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; 
      background-color: #f4f7f6; font-family: system-ui, -apple-system, sans-serif;
    }
    
    .wrapper { position: absolute; left: 0; width: 100vw; top: -55px; height: calc(100vh + 55px); background-color: #f4f7f6; }
    @media (min-width: 600px) { .wrapper { top: -45px; height: calc(100vh + 45px); } }
    @media (min-width: 1024px) { .wrapper { top: -36px; height: calc(100vh + 36px); } }
    
    iframe { width: 100%; height: 100%; border: none; background-color: transparent; }
    
    #offline-fallback { 
      display: none; height: 100vh; width: 100vw; flex-direction: column; 
      align-items: center; justify-content: center; text-align: center; color: #2b2d42;
    }

    /* PREMIUM SPLASH SCREEN */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #f4f7f6; z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; transition: opacity 0.5s ease;
    }
    
    .pulse-logo {
      width: 160px; /* Better sizing */
      max-width: 70%;
      object-fit: contain;
      mix-blend-mode: multiply; /* MAGIC TRICK: Makes the white background transparent! */
      margin-bottom: 25px; 
      animation: pulse 1.5s infinite ease-in-out;
    }
    
    @keyframes pulse { 
      0% { transform: scale(0.97); opacity: 0.85; } 
      50% { transform: scale(1.03); opacity: 1; } 
      100% { transform: scale(0.97); opacity: 0.85; } 
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="./icon-512.png" alt="GDL Logo" class="pulse-logo">
    <div style="color: #8d99ae; font-weight: 600; font-size: 13px; letter-spacing: 0.5px;">Connecting Securely...</div>
  </div>

  <div id="offline-fallback">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;"><path d="m2 2 20 20"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/></svg>
    <h2 style="margin: 0 0 10px 0;">No Connection</h2>
    <p style="margin: 0; color: #8d99ae; font-size: 14px; max-width: 250px;">You must be connected to the internet to launch the attendance portal.</p>
  </div>

  <div class="wrapper" id="app-wrapper">
    <iframe src="https://script.google.com/macros/s/AKfycbxqFEUINjN708d9WfBDbnTOpzcYRkXtbawFWtycQwV4ki-SqzDqMblXKNrTcdsUr_dt/exec" allow="geolocation"></iframe>
  </div>

  <script>
    function hideSplash() {
      const splash = document.getElementById('splash-screen');
      splash.style.opacity = '0';
      setTimeout(() => splash.style.display = 'none', 500); 
    }

    if (!navigator.onLine) {
      document.getElementById('app-wrapper').style.display = 'none';
      document.getElementById('splash-screen').style.display = 'none';
      document.getElementById('offline-fallback').style.display = 'flex';
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
