  <title>Attendance Portal</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f7f6; font-family: system-ui, -apple-system, sans-serif; }
    .wrapper { position: absolute; left: 0; width: 100vw; top: -55px; height: calc(100vh + 55px); background-color: #f4f7f6; }
    @media (min-width: 600px) { .wrapper { top: -45px; height: calc(100vh + 45px); } }
    @media (min-width: 1024px) { .wrapper { top: -36px; height: calc(100vh + 36px); } }
    
    iframe { width: 100%; height: 100%; border: none; background-color: transparent; }
    
    #offline-fallback { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #2b2d42; }

    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #f4f7f6; z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; transition: opacity 0.5s ease;
    }
    
    .pulse-logo {
      width: 260px; /* Perfectly sized for the center of the phone screen */
      max-width: 80%;
      margin-bottom: 25px; 
      animation: pulse 1.5s infinite ease-in-out;
    }
    
    @keyframes pulse { 
      0% { transform: scale(0.97); opacity: 0.85; } 
      50% { transform: scale(1.03); opacity: 1; } 
      100% { transform: scale(0.97); opacity: 0.85; } 
    }
  </style>

<script>
    // Bulletproof Splash Screen Fader
    let splashHidden = false;
    function hideSplash() {
      if (splashHidden) return;
      splashHidden = true;
      const splash = document.getElementById('splash-screen');
      splash.style.opacity = '0';
      setTimeout(() => splash.style.display = 'none', 500); 
    }

    // 1. Listen for the exact "Ready" signal from Google Apps Script
    window.addEventListener('message', (event) => {
      if (event.data === 'hideSplash') {
        hideSplash();
      }
    });

    // 2. FAILSAFE: If Google takes longer than 6 seconds or fails, force the splash screen to hide anyway
    setTimeout(hideSplash, 6000);

    // 3. Offline Check
    if (!navigator.onLine) {
      document.getElementById('app-wrapper').style.display = 'none';
      document.getElementById('splash-screen').style.display = 'none';
      document.getElementById('offline-fallback').style.display = 'flex';
    }

    // 4. PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
