<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Attendance Portal</title>
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f4f7f6; 
    }
    
    /* 1. MOBILE PHONES (Default) - Banner might wrap to two lines */
    .wrapper {
      position: absolute; left: 0; width: 100vw;
      top: -55px; 
      height: calc(100vh + 55px);
    }
    
    /* 2. TABLETS - Single line banner but slightly larger UI chrome */
    @media (min-width: 600px) {
      .wrapper {
        top: -45px; 
        height: calc(100vh + 45px);
      }
    }
    
    /* 3. DESKTOPS - Standard exact 36px Google warning banner */
    @media (min-width: 1024px) {
      .wrapper {
        top: -36px; 
        height: calc(100vh + 36px);
      }
    }
    
    iframe { 
      width: 100%; height: 100%; border: none; 
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <iframe src="https://script.google.com/macros/s/AKfycbxqFEUINjN708d9WfBDbnTOpzcYRkXtbawFWtycQwV4ki-SqzDqMblXKNrTcdsUr_dt/exec"></iframe>
  </div>

</body>
</html>
