<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- PWA MANIFEST & THEME COLOR -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  
  <title>Attendance Portal</title>
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; 
      background: #f4f7f6; font-family: system-ui, -apple-system, sans-serif;
    }
    
    /* Hides the Google Apps Script Warning Banner */
    .wrapper { position: absolute; left: 0; width: 100vw; top: -55px; height: calc(100vh + 55px); }
    @media (min-width: 600px) { .wrapper { top: -45px; height: calc(100vh + 45px); } }
    @media (min-width: 1024px) { .wrapper { top: -36px; height: calc(100vh + 36px); } }
    
    iframe { width: 100%; height: 100%; border: none; }
    
    /* Cold-boot Offline Fallback UI */
    #offline-fallback { 
      display: none; height: 100vh; width: 100vw; flex-direction: column; 
      align-items: center; justify-content: center; text-align: center; color: #2b2d42;
    }

    /* --- NEW PROFESSIONAL INSTALL BUTTON --- */
    #install-btn {
      display: none; /* Hidden by default until Chrome confirms PWA is ready */
      position: fixed;
      top: 16px;
      right: 16px;
      background-color: #007bff; /* Squoosh App Blue */
      color: #ffffff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 6px rgba(0, 123, 255, 0.3);
      cursor: pointer;
      z-index: 10000;
      transition: background-color 0.2s ease, transform 0.1s ease;
      font-family: inherit;
    }

    #install-btn:hover { background-color: #0056b3; }
    #install-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>

  <!-- Fallback if they tap the app icon without internet -->
  <div id="offline-fallback">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;"><path d="m2 2 20 20"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/></svg>
    <h2 style="margin: 0 0 10px 0;">No Connection</h2>
    <p style="margin: 0; color: #8d99ae; font-size: 14px; max-width: 250px;">You must be connected to the internet to launch the attendance portal.</p>
  </div>

  <!-- NATIVE INSTALL BUTTON -->
  <button id="install-btn">Install</button>

  <div class="wrapper" id="app-wrapper">
    <!-- PASTE YOUR EXACT GOOGLE SCRIPT WEB APP URL BELOW -->
    <iframe src="https://script.google.com/macros/s/AKfycbxqFEUINjN708d9WfBDbnTOpzcYRkXtbawFWtycQwV4ki-SqzDqMblXKNrTcdsUr_dt/exec" allow="geolocation"></iframe>
  </div>

  <script>
    // 1. Check if device is offline on initial boot
    if (!navigator.onLine) {
      document.getElementById('app-wrapper').style.display = 'none';
      document.getElementById('offline-fallback').style.display = 'flex';
    }

    // 2. Register the PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('PWA Ready'))
          .catch(err => console.error('PWA Failed', err));
      });
    }
    // 4. PROFESSIONAL PWA INSTALL ENGINE
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    // Chrome fires this event when it verifies your manifest and icons are perfect
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); 
      deferredPrompt = e; 
      installBtn.style.display = 'block'; // Reveal the top-right button
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt(); // Trigger native install UI
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('App installed successfully');
        }
        deferredPrompt = null; 
        installBtn.style.display = 'none'; // Hide button after interaction
      }
    });

    // Ensures button hides permanently if installed via browser menu
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });
  </script>
</body>
</html>
